AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Search Keyword Performance Processor - Lambda reads from S3 and writes output back to S3

# NOTE: The S3 bucket is managed independently of this stack. The Lambda function
# is granted access to it via IAM policy. This separation ensures the bucket and
# its data are not affected by Lambda stack updates or teardowns.
#
# Actual parameter values are stored in samconfig.toml locally and are NOT committed
# to version control.

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.9

Parameters:
  BucketName:
    Type: String
    Description: Pre-existing S3 bucket for input and output files

  InputKey:
    Type: String
    Description: S3 key of the input file to process

  OutputPrefix:
    Type: String
    Description: S3 prefix where output files are written

Resources:

  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SearchKeywordProcessor
      CodeUri: ./
      Handler: lambda_handler.lambda_handler
      Description: >
        Reads hit-level data from S3, computes search keyword revenue,
        and writes results back to S3.
      Environment:
        Variables:
          BUCKET_NAME: !Ref BucketName
          INPUT_KEY: !Ref InputKey
          OUTPUT_PREFIX: !Ref OutputPrefix
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref BucketName

Outputs:
  ProcessorFunctionArn:
    Description: Lambda Function ARN
    Value: !GetAtt ProcessorFunction.Arn
  InputLocation:
    Description: Input file location
    Value: !Sub "s3://${BucketName}/${InputKey}"
  OutputLocation:
    Description: Output files will appear here
    Value: !Sub "s3://${BucketName}/${OutputPrefix}/"
