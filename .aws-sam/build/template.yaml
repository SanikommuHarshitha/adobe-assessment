AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Search Keyword Performance Processor - Lambda reads from S3 and writes
  output back to S3
Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.9
Parameters:
  BucketName:
    Type: String
    Description: Pre-existing S3 bucket for input and output files
  InputKey:
    Type: String
    Description: S3 key of the input file to process
  OutputPrefix:
    Type: String
    Description: S3 prefix where output files are written
Resources:
  ProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SearchKeywordProcessor
      CodeUri: ProcessorFunction
      Handler: lambda_handler.lambda_handler
      Description: 'Reads hit-level data from S3, computes search keyword revenue,
        and writes results back to S3.

        '
      Environment:
        Variables:
          BUCKET_NAME:
            Ref: BucketName
          INPUT_KEY:
            Ref: InputKey
          OUTPUT_PREFIX:
            Ref: OutputPrefix
      Policies:
      - S3CrudPolicy:
          BucketName:
            Ref: BucketName
    Metadata:
      SamResourceId: ProcessorFunction
Outputs:
  ProcessorFunctionArn:
    Description: Lambda Function ARN
    Value:
      Fn::GetAtt:
      - ProcessorFunction
      - Arn
  InputLocation:
    Description: Input file location
    Value:
      Fn::Sub: s3://${BucketName}/${InputKey}
  OutputLocation:
    Description: Output files will appear here
    Value:
      Fn::Sub: s3://${BucketName}/${OutputPrefix}/
